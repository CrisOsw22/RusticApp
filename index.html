<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Rustic Wings - App Oficial</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Bvp7Pn1S/IMG-20260404-WA0006.jpg">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Bvp7Pn1S/IMG-20260404-WA0006.jpg">

    <style>
        :root { 
            --naranja: #ff8500; --rojo: #d00000; --negro: #121212; 
            --blanco: #ffffff; --fb-blue: #1877F2; --mostaza: #ffb703;
            --gris: #f8f8f8;
        }
        /* FIX DE CLICS: Aseguramos que el cuerpo no esté bloqueado */
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--negro); margin: 0; padding: 10px; color: #333; overflow-x: hidden; }
        
        .container { max-width: 500px; margin: auto; background: var(--blanco); border-radius: 25px; overflow: hidden; border: 3px solid var(--naranja); position: relative; z-index: 1; }
        
        .header { position: relative; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--negro); }
        .portada { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://images.pexels.com/photos/10361458/pexels-photo-10361458.jpeg?auto=compress&cs=tinysrgb&w=800'); background-size: cover; background-position: center; filter: brightness(0.4); z-index: 1; }
        .logo { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--mostaza); z-index: 2; object-fit: cover; }
        .header h1 { color: white; z-index: 2; margin: 10px 0 0 0; font-size: 1.4em; text-shadow: 2px 2px 8px #000; font-weight: 900; }

        /* SECCIONES */
        .ia-section { background: #fff3cd; margin: 15px; padding: 15px; border-radius: 20px; border: 2px dashed var(--naranja); text-align: center; }
        .btn-ia { background: white; border: 2px solid var(--naranja); padding: 8px; border-radius: 12px; cursor: pointer; font-size: 0.8em; font-weight: bold; margin: 3px; -webkit-appearance: none; }

        .fb-promo { background: #e7f3ff; padding: 15px; margin: 10px; border-radius: 15px; border: 1px solid var(--fb-blue); text-align: center; }
        .btn-fb { background: var(--fb-blue); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; display: inline-block; font-size: 0.85em; }

        .categoria-titulo { background: var(--negro); color: var(--mostaza); padding: 12px 15px; margin: 0; border-left: 8px solid var(--rojo); font-size: 1em; text-transform: uppercase; }
        .producto { padding: 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; position: relative; }
        .prod-main { display: flex; justify-content: space-between; align-items: center; }
        .precio { color: var(--rojo); font-weight: 800; font-size: 1.1em; }
        .btn-add { background: var(--naranja); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; z-index: 5; position: relative; }

        /* FIX MODALES: Asegurar que NO bloqueen si están cerrados */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
            pointer-events: auto;
        }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; border: 4px solid var(--naranja); }
        
        .salsa-chip { display: block; padding: 12px; margin: 8px 0; border: 2px solid var(--naranja); border-radius: 12px; cursor: pointer; font-weight: bold; }
        .salsa-chip.selected { background: var(--naranja); color: white; }

        .upsell-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn-upsell { background: #f0f0f0; border: 1px solid #ddd; padding: 10px; border-radius: 10px; font-size: 0.75em; cursor: pointer; font-weight: bold; }

        .resumen { padding: 15px; margin: 15px; background: var(--gris); border-radius: 15px; border: 1px solid #ddd; }
        .nota-envio { color: var(--rojo); font-weight: 900; font-size: 0.85em; margin-top: 8px; display: none; background: #fff1f1; border: 2px solid var(--rojo); padding: 12px; border-radius: 12px; text-align: center; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 10px; font-size: 16px; /* Evita zoom en iPhone */ }
        .btn-whatsapp { background: #25d366; color: white; border: none; width: 90%; display: block; margin: 20px auto; padding: 20px; font-size: 1.1em; font-weight: bold; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div id="modal-salsas" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modal-titulo">Salsas</h3>
        <div id="lista-salsas" style="max-height: 250px; overflow-y: auto;"></div>
        <button id="btn-confirmar-salsas" class="btn-add" style="margin-top:15px; width:100%; display:none;">CONFIRMAR</button>
        <button onclick="cerrarModales()" style="margin-top:10px; background:none; border:none; color:gray;">Cancelar</button>
    </div>
</div>

<div id="modal-upsell" class="modal-overlay">
    <div class="modal-content">
        <h3 style="color: var(--rojo);">¿Algo más? 🤔</h3>
        <div class="upsell-grid">
            <button class="btn-upsell" onclick="agregarUpsell('Papas Francesas', 55)">🍟 Papas (+$55)</button>
            <button class="btn-upsell" onclick="agregarUpsell('Dedos de Queso', 90)">🧀 Dedos (+$90)</button>
            <button class="btn-upsell" onclick="agregarUpsell('Aros de Cebolla', 60)">🧅 Aros (+$60)</button>
            <button class="btn-upsell" onclick="agregarUpsell('Burripizza', 65)">🍕 Burripizza (+$65)</button>
        </div>
        <button class="btn-whatsapp" style="width:100%; margin: 10px 0;" onclick="finalizarPedidoReal()">✅ ASÍ ESTÁ BIEN</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="portada"></div>
        <img src="https://i.postimg.cc/Bvp7Pn1S/IMG-20260404-WA0006.jpg" class="logo">
        <h1>THE RUSTIC WINGS</h1>
    </div>

    <div class="ia-section">
        <strong>✨ RUSTIC IA:</strong><br>
        <button class="btn-ia" onclick="sugerir(1)">Solo yo</button>
        <button class="btn-ia" onclick="sugerir(2)">Pareja</button>
        <button class="btn-ia" onclick="sugerir(4)">Team</button>
        <button class="btn-ia" onclick="sugerir(0)">Niños</button>
        <div id="sugerencia-box" style="display:none; margin-top:10px; padding:10px; background:white; border-radius:10px;">
            <p id="ia-texto" style="font-size:0.8em; font-weight:bold;"></p>
            <div id="ia-opciones"></div>
        </div>
    </div>

    <div class="fb-promo">
        <a href="https://www.facebook.com/share/1CcMNWFvoM/" target="_blank" class="btn-fb">👍 FACEBOOK</a>
        <label style="display:block; margin-top:10px; font-weight:bold;">
            <input type="checkbox" id="chk-like" onchange="actualizarUI()"> ¡YA LOS SIGO! (10% OFF)
        </label>
    </div>

    <h3 class="categoria-titulo">Menú Principal</h3>
    <div class="producto"><div class="prod-main"><strong>Orden Individual</strong><span class="precio">$120</span></div><button class="btn-add" onclick="abrirSalsas('Orden', 120, 2)">+</button></div>
    <div class="producto"><div class="prod-main"><strong>Medio Kilo</strong><span class="precio">$170</span></div><button class="btn-add" onclick="abrirSalsas('Medio Kilo', 170, 3)">+</button></div>
    <div class="producto"><div class="prod-main"><strong>El Kilo</strong><span class="precio">$320</span></div><button class="btn-add" onclick="abrirSalsas('Kilo', 320, 4)">+</button></div>
    
    <h3 class="categoria-titulo">Hamburguesas</h3>
    <div class="producto"><div class="prod-main"><strong>Hamb. Arrachera</strong><span class="precio">$95</span></div><button class="btn-add" onclick="agregarAlCarrito('Hamb. Arrachera', 95)">+</button></div>
    <div class="producto"><div class="prod-main"><strong>Hamb. Boneless</strong><span class="precio">$120</span></div><button class="btn-add" onclick="abrirSalsas('Hamb. Boneless', 120, 2)">+</button></div>

    <h3 class="categoria-titulo">Complementos</h3>
    <div class="producto"><div class="prod-main"><strong>Papas Francesas</strong><span class="precio">$55</span></div><button class="btn-add" onclick="agregarAlCarrito('Papas Francesas', 55)">+</button></div>
    <div class="producto"><div class="prod-main"><strong>Dedos de Queso</strong><span class="precio">$90</span></div><button class="btn-add" onclick="agregarAlCarrito('Dedos de Queso', 90)">+</button></div>

    <div class="form-group" style="padding:15px;">
        <label>Tu Nombre:</label>
        <input type="text" id="cliente" placeholder="Nombre...">
        <label>Entrega:</label>
        <select id="entrega" onchange="actualizarUI()">
            <option value="Domicilio">📍 Domicilio</option>
            <option value="PickUp">🏎️ Recoger</option>
        </select>
        <div id="nota-envio" class="nota-envio">⚠️ Envío se cotiza al mandar ubicación</div>
        <label>Comentarios:</label>
        <textarea id="comentarios" placeholder="Notas..."></textarea>
    </div>

    <div class="resumen">
        <strong>🛒 Carrito:</strong>
        <ul id="lista-carrito" style="padding:10px 0;"></ul>
        <div style="font-size:1.4em; font-weight:900; color:var(--rojo);">TOTAL: $<span id="total">0</span></div>
    </div>

    <button class="btn-whatsapp" onclick="mostrarUpsell()">🚀 PEDIR POR WHATSAPP</button>
</div>

<script>
    let carrito = [];
    let subtotal = 0;
    const menuSalsas = ["Mango habanero 🔥", "Búfalo 🔥", "Mango cremoso 🔥", "Pica fresa 🔥", "Chipotle 🌶️", "BBQ hot 🌶️", "Parmesano ✨", "BBQ ✨", "Lemon paper ✨"];
    let salsasSeleccionadas = [];
    let limiteSalsas = 0;
    let productoActual = null;

    function cerrarModales() {
        document.getElementById('modal-salsas').style.display = 'none';
        document.getElementById('modal-upsell').style.display = 'none';
    }

    function sugerir(num) {
        const box = document.getElementById('sugerencia-box');
        box.style.display = 'block';
        const opt = document.getElementById('ia-opciones');
        opt.innerHTML = '';
        if(num === 1) { document.getElementById('ia-texto').innerText = "Para ti:"; crearBotonIA(opt, "Orden Ind.", 120, 2); }
        else if(num === 0) { document.getElementById('ia-texto').innerText = "Niños:"; crearBotonIA(opt, "Papas", 55, 0); }
        else { document.getElementById('ia-texto').innerText = "Recomendado:"; crearBotonIA(opt, "El Kilo", 320, 4); }
    }

    function crearBotonIA(cont, n, p, s) {
        let b = document.createElement('button'); b.className = 'btn-add'; b.innerText = `+ ${n}`;
        b.onclick = () => s > 0 ? abrirSalsas(n, p, s) : agregarAlCarrito(n, p);
        cont.appendChild(b);
    }

    function abrirSalsas(nombre, precio, limite) {
        productoActual = { nombre, precio };
        limiteSalsas = limite; salsasSeleccionadas = [];
        document.getElementById('modal-titulo').innerText = `Elige ${limite} salsas`;
        const cont = document.getElementById('lista-salsas');
        cont.innerHTML = '';
        menuSalsas.forEach(s => {
            const chip = document.createElement('div');
            chip.className = 'salsa-chip'; chip.innerText = s;
            chip.onclick = () => {
                if(chip.classList.contains('selected')) {
                    chip.classList.remove('selected');
                    salsasSeleccionadas = salsasSeleccionadas.filter(x => x !== s);
                } else if(salsasSeleccionadas.length < limiteSalsas) {
                    chip.classList.add('selected');
                    salsasSeleccionadas.push(s);
                }
                document.getElementById('btn-confirmar-salsas').style.display = salsasSeleccionadas.length > 0 ? 'block' : 'none';
            };
            cont.appendChild(chip);
        });
        document.getElementById('modal-salsas').style.display = 'flex';
    }

    document.getElementById('btn-confirmar-salsas').onclick = () => {
        agregarAlCarrito(`${productoActual.nombre} (${salsasSeleccionadas.join(", ")})`, productoActual.precio);
        cerrarModales();
    };

    function agregarAlCarrito(nombre, precio) {
        carrito.push({nombre, precio});
        subtotal += precio;
        actualizarUI();
    }

    function agregarUpsell(n, p) { agregarAlCarrito(n, p); alert("Añadido!"); }

    function mostrarUpsell() {
        if(!document.getElementById('cliente').value || carrito.length === 0) return alert("Pon tu nombre y elige algo.");
        document.getElementById('modal-upsell').style.display = 'flex';
    }

    function finalizarPedidoReal() {
        const n = document.getElementById('cliente').value;
        const e = document.getElementById('entrega').value;
        const c = document.getElementById('comentarios').value;
        let msg = `*THE RUSTIC WINGS*%0ACliente: ${n}%0AEntrega: ${e}%0A------------------%0A`;
        carrito.forEach(i => msg += `- ${i.nombre}%0A`);
        if(c) msg += `Notas: ${c}%0A`;
        msg += `TOTAL: $${document.getElementById('total').innerText}`;
        if(e === 'Domicilio') msg += `%0A%0A📍 *ENVIARÉ MI UBICACIÓN ABAJO*`;
        window.open(`https://wa.me/528334434833?text=${msg}`);
        cerrarModales();
    }

    function actualizarUI() {
        const l = document.getElementById('lista-carrito'); l.innerHTML = '';
        carrito.forEach(i => l.innerHTML += `<li>${i.nombre} - $${i.precio}</li>`);
        let desc = document.getElementById('chk-like').checked ? (subtotal * 0.10) : 0;
        document.getElementById('total').innerText = (subtotal - desc).toFixed(2);
        document.getElementById('nota-envio').style.display = document.getElementById('entrega').value === 'Domicilio' ? 'block' : 'none';
    }
</script>
</body>
</html>
